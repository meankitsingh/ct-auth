services:
  # Main Stack Auth Application (Backend + Dashboard)
  app:
    build:
      context: .
      dockerfile: docker/server/Dockerfile
    ports:
      - "8101:8101" # Dashboard
      - "8102:8102" # Backend
    environment:
      - NODE_ENV=production
      # IMPORTANT: Replace with your actual production connection string
      - STACK_DATABASE_CONNECTION_STRING=postgres://postgres:SECURE-PASSWORD@db:5432/stackframe
      - NEXT_PUBLIC_STACK_API_URL=http://localhost:8102
      - NEXT_PUBLIC_STACK_DASHBOARD_URL=http://localhost:8101
      - USE_INLINE_ENV_VARS=true
      - NEXT_PUBLIC_STACK_PORT_PREFIX=81
      - STACK_SEED_INTERNAL_PROJECT_USER_EMAIL=admin@example.com
      - STACK_SEED_INTERNAL_PROJECT_USER_PASSWORD=AdminPassword123!
      - STACK_SEED_INTERNAL_PROJECT_USER_INTERNAL_ACCESS=true
      - STACK_SEED_INTERNAL_PROJECT_PUBLISHABLE_CLIENT_KEY=STACK_ENV_VAR_SENTINEL_STACK_SEED_INTERNAL_PROJECT_PUBLISHABLE_CLIENT_KEY
      - STACK_SEED_INTERNAL_PROJECT_SECRET_SERVER_KEY=STACK_ENV_VAR_SENTINEL_STACK_SEED_INTERNAL_PROJECT_SECRET_SERVER_KEY
      - STACK_SVIX_API_KEY=test_api_key_12345678901234567890
      # IMPORTANT: Use a securely generated secret (min 32 chars)
      - STACK_SERVER_SECRET=wuNpik0gIW4mruTz25rbIvhuuvZFrLOLtL7J4tyo
      - STACK_ALLOW_LOCAL_RENDERING=true
      # Mandatory for rendering emails in production mode:
      # - STACK_FREESTYLE_API_KEY=your-freestyle-key
      # OR:
      # - STACK_VERCEL_SANDBOX_TOKEN=your-vercel-token
      
      - STACK_RUN_MIGRATIONS=true
      - STACK_RUN_SEED_SCRIPT=true # Only creates the 'internal' project/team, no users by default
      - STACK_EMAIL_HOST=smtp.hostinger.com
      - STACK_EMAIL_PORT=465
      - STACK_EMAIL_USERNAME=ankit@cognitiontree.com
      - STACK_EMAIL_PASSWORD=k6BmB^Ez=M
      - STACK_EMAIL_SENDER=ankit@cognitiontree.com
      - STACK_CLICKHOUSE_URL=http://clickhouse:8123
      - STACK_CLICKHOUSE_ADMIN_PASSWORD=SECURE-CLICKHOUSE-PASSWORD
      - STACK_CLICKHOUSE_EXTERNAL_PASSWORD=SECURE-CLICKHOUSE-PASSWORD
    depends_on:
      db:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      inbucket:
        condition: service_healthy

  # Database
  db:
    build: docker/dev-postgres-with-extensions
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: SECURE-PASSWORD
      POSTGRES_DB: stackframe
    ports:
      - "8128:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stackframe"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ClickHouse (for analytics)
  clickhouse:
    image: clickhouse/clickhouse-server:25.10
    ports:
      - "8136:8123"
    environment:
      CLICKHOUSE_DB: analytics
      CLICKHOUSE_USER: stackframe
      CLICKHOUSE_PASSWORD: SECURE-CLICKHOUSE-PASSWORD
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Inbucket (for email testing - typically swapped for a real provider in production)
  inbucket:
    image: inbucket/inbucket:3.1.0
    ports:
      - "8105:9000" # Web UI
      - "8129:2500" # SMTP
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9000/"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  clickhouse-data:
