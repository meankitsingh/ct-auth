version: '3.8'

services:
  freestyle-mock:
    build:
      context: ./docker/dependencies/freestyle-mock
      dockerfile: Dockerfile
    image: stack-freestyle-mock:latest
    container_name: stack-freestyle-mock
    restart: always
    ports:
      - "8122:8080"
    environment:
      - NODE_ENV=production
    # Optional: limit resources for security
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
